<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoCity | Request Access</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-container-low": "#161c28",
                    "surface-container-highest": "#2f3542",
                    "surface-container-high": "#242a36",
                    "outline-variant": "#3d494c",
                    "primary": "#4cd7f6",
                    "on-primary": "#003640",
                    "surface": "#0e131f",
                    "on-surface": "#dde2f3",
                    "on-surface-variant": "#bcc9cd"
            },
            "fontFamily": {
                    "headline-xl": ["Outfit"],
                    "body-md": ["Inter"],
                    "label-sm": ["Inter"],
                    "headline-md": ["Outfit"]
            }
          }
        }
      }
    </script>
    <style>
        body { background-color: #0e131f; color: #dde2f3; overflow-x: hidden; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="font-body-md selection:bg-primary selection:text-on-primary">

    <div class="fixed inset-0 overflow-hidden -z-10 pointer-events-none">
        <div class="absolute top-[-10%] right-[-10%] w-[500px] h-[500px] rounded-full bg-primary/10 blur-[120px] animate-pulse"></div>
        <div class="absolute bottom-[10%] left-[-5%] w-[400px] h-[400px] rounded-full bg-green-500/10 blur-[100px]"></div>
    </div>

    <div class="absolute top-8 left-8 flex items-center gap-2 cursor-pointer" onclick="window.location.href='index.html'">
        <span class="material-symbols-outlined text-primary text-3xl">domain</span>
        <span class="font-headline-md text-2xl font-black tracking-tighter text-primary">NeoCity</span>
    </div>

    <div class="w-full max-w-md bg-surface-container-low/40 backdrop-blur-xl border border-outline-variant/30 rounded-3xl p-10 shadow-2xl relative">
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-32 h-1 bg-gradient-to-r from-transparent via-primary to-transparent"></div>
        
        <h2 class="font-headline-xl text-3xl font-bold text-on-surface mb-2">Join NeoCity</h2>
        <p class="text-on-surface-variant text-sm mb-8">Register your citizen profile to access the grid.</p>

        <div class="flex flex-col gap-5">
            <div>
                <label class="block text-label-sm text-outline-variant uppercase tracking-widest font-bold mb-2">Full Name</label>
                <input type="text" id="name" class="w-full bg-surface-container-highest border border-outline-variant/30 rounded-xl px-4 py-3 text-on-surface focus:border-primary outline-none transition-colors" placeholder="John Doe">
            </div>
            <div>
                <label class="block text-label-sm text-outline-variant uppercase tracking-widest font-bold mb-2">Email Identity</label>
                <input type="email" id="email" class="w-full bg-surface-container-highest border border-outline-variant/30 rounded-xl px-4 py-3 text-on-surface focus:border-primary outline-none transition-colors" placeholder="citizen@neocity.com">
            </div>
            <div>
                <label class="block text-label-sm text-outline-variant uppercase tracking-widest font-bold mb-2">Passcode</label>
                <input type="password" id="password" class="w-full bg-surface-container-highest border border-outline-variant/30 rounded-xl px-4 py-3 text-on-surface focus:border-primary outline-none transition-colors" placeholder="••••••••">
            </div>
            
            <button onclick="register()" class="w-full bg-primary hover:bg-primary/90 text-on-primary font-bold py-3 mt-4 rounded-xl shadow-[0_0_15px_rgba(76,215,246,0.3)] hover:scale-[1.02] transition-all">
                Initialize Profile
            </button>
        </div>

        <p class="text-center text-sm text-on-surface-variant mt-8">
            Already verified? <a href="login.html" class="text-primary font-bold hover:underline">Authenticate Here</a>
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">

    <script>
        async function register() {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });

                const data = await res.json();
                if(data.success) {
                    Toastify({ text: "Profile Created! Redirecting...", duration: 2000, style: { background: "#4cd7f6", color: "#003640", borderRadius: "10px" } }).showToast();
                    setTimeout(() => window.location.href = 'login.html', 2000);
                } else {
                    Toastify({ text: data.message, duration: 3000, style: { background: "#ffb4ab", color: "#690005", borderRadius: "10px" } }).showToast();
                }
            } catch(e) {
                Toastify({ text: "Server Error", duration: 3000, style: { background: "#ffb4ab", color: "#690005", borderRadius: "10px" } }).showToast();
            }
        }
    </script>
</body>
</html>
