<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoCity | Command Center</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-container-low": "#161c28",
                    "on-background": "#dde2f3",
                    "secondary": "#d0bcff",
                    "on-primary": "#003640",
                    "secondary-container": "#571bc1",
                    "on-secondary": "#3c0091",
                    "surface": "#0e131f",
                    "tertiary-fixed-dim": "#4edea3",
                    "on-tertiary-fixed-variant": "#005236",
                    "on-primary-container": "#00424f",
                    "surface-container-highest": "#2f3542",
                    "surface-container-high": "#242a36",
                    "outline": "#869397",
                    "on-error-container": "#ffdad6",
                    "surface-tint": "#4cd7f6",
                    "on-tertiary-fixed": "#002113",
                    "tertiary-fixed": "#6ffbbe",
                    "inverse-surface": "#dde2f3",
                    "surface-dim": "#0e131f",
                    "surface-bright": "#343946",
                    "background": "#0e131f",
                    "secondary-fixed": "#e9ddff",
                    "primary-fixed-dim": "#4cd7f6",
                    "on-surface-variant": "#bcc9cd",
                    "on-surface": "#dde2f3",
                    "on-primary-fixed": "#001f26",
                    "primary": "#4cd7f6",
                    "on-secondary-fixed": "#23005c",
                    "on-error": "#690005",
                    "surface-container-lowest": "#080e1a",
                    "on-secondary-fixed-variant": "#5516be",
                    "inverse-on-surface": "#2b303d",
                    "tertiary-container": "#1bbd85",
                    "primary-fixed": "#acedff",
                    "error": "#ffb4ab",
                    "surface-variant": "#2f3542",
                    "tertiary": "#4edea3",
                    "error-container": "#93000a",
                    "on-primary-fixed-variant": "#004e5c",
                    "on-tertiary-container": "#00452e",
                    "on-secondary-container": "#c4abff",
                    "outline-variant": "#3d494c",
                    "on-tertiary": "#003824",
                    "secondary-fixed-dim": "#d0bcff",
                    "inverse-primary": "#00687a",
                    "primary-container": "#06b6d4",
                    "surface-container": "#1a202c"
            },
            "fontFamily": {
                    "headline-xl": ["Outfit"],
                    "body-md": ["Inter"],
                    "label-sm": ["Inter"],
                    "headline-md": ["Outfit"],
                    "headline-lg": ["Outfit"],
                    "body-lg": ["Inter"]
            }
          }
        }
      }
    </script>
    <style>
        body { background-color: #0e131f; color: #dde2f3; overflow: hidden; display: flex; height: 100vh; font-family: 'Inter', sans-serif; }
        
        .sidebar { width: 450px; background: rgba(22, 28, 40, 0.95); backdrop-filter: blur(20px); border-right: 1px solid rgba(134, 147, 151, 0.2); z-index: 1000; display: flex; flex-direction: column; }
        
        .pulse-emerald { animation: pulse-emerald 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse-emerald { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: .7; transform: scale(1.1); } }
        
        .chat-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        .chat-container::-webkit-scrollbar { width: 6px; }
        .chat-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 12px; font-size: 0.9rem; line-height: 1.4; animation: fadeIn 0.3s ease; }
        .msg.bot { background: #242a36; color: #dde2f3; border: 1px solid rgba(255,255,255,0.05); align-self: flex-start; border-bottom-left-radius: 2px; }
        .msg.user { background: #4cd7f6; color: #003640; align-self: flex-end; border-bottom-right-radius: 2px; font-weight: 500; }
        .msg.emergency { background: rgba(255, 180, 171, 0.1); color: #ffb4ab; border: 1px solid rgba(255, 180, 171, 0.3); align-self: center; width: 100%; text-align: center; font-weight: 600; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Service Cards in Chat */
        .service-card { background: rgba(36, 42, 54, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(134, 147, 151, 0.2); border-radius: 12px; padding: 16px; margin-top: 5px; }
        .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
        .card-name { font-weight: 700; font-size: 0.95rem; color: #dde2f3; font-family: 'Outfit', sans-serif;}
        .card-badge { font-size: 0.65rem; padding: 2px 8px; border-radius: 4px; background: rgba(76, 215, 246, 0.1); color: #4cd7f6; font-weight: 700; text-transform: uppercase; border: 1px solid rgba(76, 215, 246, 0.2); }
        
        .live-status { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; background: rgba(0,0,0,0.2); padding: 8px; border-radius: 6px; margin: 8px 0; color: #bcc9cd; border: 1px solid rgba(255,255,255,0.05); }
        .dot { width: 8px; height: 8px; border-radius: 50%; }
        .dot-green { background: #4edea3; box-shadow: 0 0 8px rgba(78, 222, 163, 0.6); }
        .dot-orange { background: #f59e0b; box-shadow: 0 0 8px rgba(245, 158, 11, 0.6); }

        .btn-act { flex: 1; padding: 10px; border-radius: 8px; font-size: 0.8rem; font-weight: 600; cursor: pointer; border: none; display: flex; align-items: center; justify-content: center; gap: 5px; transition: all 0.2s; }
        .btn-nav { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #dde2f3; }
        .btn-nav:hover { background: rgba(255,255,255,0.1); }
        .btn-visit { background: #4cd7f6; color: #003640; box-shadow: 0 4px 15px rgba(76, 215, 246, 0.3); }
        .btn-visit:hover { background: #acedff; transform: translateY(-2px); }

        #map { flex: 1; height: 100%; background: #0e131f; }
        .leaflet-container { background: #0e131f !important; }
        
        @media (max-width: 768px) { body { flex-direction: column-reverse; } .sidebar { width: 100%; height: 60%; } }

        /* Report Modal */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
    </style>
</head>
<body>

    <div class="sidebar">
        <!-- Header -->
        <div class="px-6 py-4 border-b border-outline-variant/30 flex justify-between items-center bg-surface-container-low">
            <div class="flex items-center gap-3">
                <a href="home.html" class="text-on-surface-variant hover:text-primary transition-colors flex items-center justify-center">
                    <span class="material-symbols-outlined text-xl">arrow_back</span>
                </a>
                <span class="material-symbols-outlined text-primary text-2xl">domain</span>
                <span class="font-headline-md text-xl font-bold text-primary">NeoCity Core</span>
            </div>
            <div class="flex items-center gap-3 text-on-surface-variant">
                <span class="text-sm font-medium"><span id="user-name">User</span></span>
                <button onclick="logout()" class="hover:text-error transition-colors flex items-center justify-center"><span class="material-symbols-outlined text-lg">logout</span></button>
            </div>
        </div>

        <!-- City Pulse -->
        <div class="grid grid-cols-3 gap-2 p-4 bg-surface-container-highest/20 border-b border-outline-variant/20">
            <div class="bg-surface-container-high border border-outline-variant/20 rounded-xl p-2 text-center flex flex-col items-center">
                <div class="flex items-center gap-1 text-[10px] text-on-surface-variant uppercase tracking-widest"><span class="w-2 h-2 rounded-full bg-tertiary"></span> AQI</div>
                <span class="font-bold text-sm text-on-surface mt-1">42 (Good)</span>
            </div>
            <div class="bg-surface-container-high border border-outline-variant/20 rounded-xl p-2 text-center flex flex-col items-center">
                <div class="flex items-center gap-1 text-[10px] text-on-surface-variant uppercase tracking-widest"><span class="w-2 h-2 rounded-full bg-warning"></span> Traffic</div>
                <span class="font-bold text-sm text-on-surface mt-1">Moderate</span>
            </div>
            <div class="bg-surface-container-high border border-outline-variant/20 rounded-xl p-2 text-center flex flex-col items-center">
                <div class="flex items-center gap-1 text-[10px] text-on-surface-variant uppercase tracking-widest"><span class="material-symbols-outlined text-[12px] text-primary">thermostat</span> Temp</div>
                <span class="font-bold text-sm text-on-surface mt-1">32°C</span>
            </div>
        </div>

        <!-- Service Quick Actions -->
        <div class="grid grid-cols-4 gap-2 px-4 py-3 border-b border-outline-variant/20 bg-surface-container-low/50">
            <button onclick="sendQuick('Hospitals')" class="flex flex-col items-center justify-center gap-1 p-2 rounded-xl bg-surface-container-high border border-outline-variant/30 hover:border-error hover:bg-error/10 transition-colors group">
                <span class="material-symbols-outlined text-error text-xl group-hover:scale-110 transition-transform">local_hospital</span>
                <span class="text-[9px] font-bold text-on-surface-variant uppercase">Medical</span>
            </button>
            <button onclick="sendQuick('Police')" class="flex flex-col items-center justify-center gap-1 p-2 rounded-xl bg-surface-container-high border border-outline-variant/30 hover:border-primary hover:bg-primary/10 transition-colors group">
                <span class="material-symbols-outlined text-primary text-xl group-hover:scale-110 transition-transform">local_police</span>
                <span class="text-[9px] font-bold text-on-surface-variant uppercase">Police</span>
            </button>
            <button onclick="sendQuick('Metro Station')" class="flex flex-col items-center justify-center gap-1 p-2 rounded-xl bg-surface-container-high border border-outline-variant/30 hover:border-secondary hover:bg-secondary/10 transition-colors group">
                <span class="material-symbols-outlined text-secondary text-xl group-hover:scale-110 transition-transform">train</span>
                <span class="text-[9px] font-bold text-on-surface-variant uppercase">Transit</span>
            </button>
            <button onclick="openReportModal()" class="flex flex-col items-center justify-center gap-1 p-2 rounded-xl bg-error/10 border border-error/30 hover:bg-error/20 transition-colors group">
                <span class="material-symbols-outlined text-error text-xl group-hover:scale-110 transition-transform">report</span>
                <span class="text-[9px] font-bold text-error uppercase">Report</span>
            </button>
        </div>

        <!-- Chat Area -->
        <div class="chat-container" id="chat-box">
            <div class="msg bot flex gap-3">
                <div class="w-8 h-8 rounded-full bg-primary/20 flex items-center justify-center border border-primary/30 flex-shrink-0">
                    <span class="material-symbols-outlined text-primary text-sm">smart_toy</span>
                </div>
                <div>👋 Welcome! I am the <b>NeoCity Assistant</b>.<br>I am connected to <b>Live Satellite Data</b>. Ask me anything!</div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="p-4 border-t border-outline-variant/30 bg-surface-container-highest flex gap-3 items-center">
            <button onclick="triggerSOS()" class="w-12 h-12 rounded-full bg-error text-on-error flex items-center justify-center flex-shrink-0 shadow-[0_0_15px_rgba(255,180,171,0.5)] hover:scale-105 transition-transform" title="EMERGENCY SOS">
                <span class="material-symbols-outlined">emergency_home</span>
            </button>
            <input type="text" id="userInput" class="flex-1 bg-surface border border-outline-variant/30 rounded-full px-5 py-3 text-sm text-on-surface focus:outline-none focus:border-primary transition-colors" placeholder="Type 'ATM near me'..." onkeypress="if(event.key === 'Enter') sendMessage()">
            <button onclick="sendMessage()" class="w-12 h-12 rounded-full bg-primary/10 text-primary flex items-center justify-center flex-shrink-0 hover:bg-primary/20 transition-colors border border-primary/30">
                <span class="material-symbols-outlined">send</span>
            </button>
        </div>
    </div>

    <!-- Map Area -->
    <div id="map"></div>

    <!-- Report Modal -->
    <div class="modal-overlay" id="reportModal">
        <div class="bg-surface-container-high border border-outline-variant/30 p-8 rounded-3xl w-full max-w-md shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <div class="flex items-center gap-2">
                    <span class="material-symbols-outlined text-error">report</span>
                    <h2 class="font-headline-md text-2xl text-on-surface font-bold">Report Issue</h2>
                </div>
                <button onclick="closeReportModal()" class="text-outline hover:text-white material-symbols-outlined transition-colors">close</button>
            </div>
            
            <label class="block text-label-sm text-outline mb-2 uppercase tracking-widest font-bold">Issue Type</label>
            <select id="issueType" class="w-full bg-surface-container-highest border border-outline-variant/30 rounded-xl px-4 py-3 text-on-surface mb-4 outline-none focus:border-primary transition-colors">
                <option value="Road Damage">🚧 Pothole / Road Damage</option>
                <option value="Garbage Dump">🗑️ Garbage Dump</option>
                <option value="Broken Streetlight">💡 Streetlight Broken</option>
                <option value="Water Leak">💧 Water Leak</option>
            </select>
            
            <label class="block text-label-sm text-outline mb-2 uppercase tracking-widest font-bold">Location Description</label>
            <textarea id="issueDesc" rows="3" class="w-full bg-surface-container-highest border border-outline-variant/30 rounded-xl px-4 py-3 text-on-surface mb-6 outline-none focus:border-primary transition-colors resize-none" placeholder="e.g., Near the main bus stop..."></textarea>
            
            <button onclick="submitReport()" class="w-full bg-error hover:bg-error-container hover:text-on-error-container text-on-error font-bold py-3 rounded-xl transition-all flex justify-center items-center gap-2">
                <span class="material-symbols-outlined text-sm">send</span> Submit Report
            </button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    
    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        if (user) document.getElementById('user-name').innerText = user.name.split(' ')[0];
        else window.location.href = 'index.html';

        function logout() { localStorage.removeItem('user'); window.location.href = 'index.html'; }

        // Dark Matter map tiles for futuristic aesthetic
        const map = L.map('map', { zoomControl: false }).setView([17.3850, 78.4867], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        let userLocation = null, markers = [];

        navigator.geolocation.watchPosition(pos => {
            userLocation = { lat: pos.coords.latitude, lon: pos.coords.longitude };
            if (!window.userMarker) {
                const pulseIcon = L.divIcon({ className: 'user-marker', html: '<div style="width:14px;height:14px;background:#4cd7f6;border-radius:50%;border:2px solid #0e131f;box-shadow:0 0 15px rgba(76,215,246,0.8); animation: pulse-emerald 2s infinite;"></div>' });
                window.userMarker = L.marker([userLocation.lat, userLocation.lon], {icon: pulseIcon}).addTo(map);
                map.flyTo([userLocation.lat, userLocation.lon], 15);
            }
        });

        const chatBox = document.getElementById('chat-box');
        
        function sendQuick(q) {
            document.getElementById('userInput').value = q;
            sendMessage();
        }

        function addMsg(sender, text) {
            const div = document.createElement('div');
            if(sender === 'bot') {
                div.className = 'msg bot flex gap-3';
                div.innerHTML = `<div class="w-8 h-8 rounded-full bg-primary/20 flex items-center justify-center border border-primary/30 flex-shrink-0"><span class="material-symbols-outlined text-primary text-sm">smart_toy</span></div><div>${text}</div>`;
            } else if(sender === 'user') {
                div.className = 'msg user';
                div.innerHTML = text;
            } else {
                div.className = 'msg emergency';
                div.innerHTML = text;
            }
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if(!text) return;
            addMsg('user', text);
            input.value = '';

            if(!userLocation) { addMsg('bot', "⚠️ Waiting for Neural Sync (GPS)..."); return; }

            addMsg('bot', '<span class="material-symbols-outlined animate-spin text-primary align-middle mr-1" style="font-size:16px;">sync</span> Processing query...');

            try {
                const res = await fetch('/chat', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ message: text, location: userLocation })
                });
                const data = await res.json();
                
                chatBox.removeChild(chatBox.lastChild); 

                markers.forEach(m => map.removeLayer(m)); markers = [];

                if(data.type === 'emergency') addMsg('emergency', `🚨 ${data.reply}`);
                else addMsg('bot', data.reply);

                if(data.data) {
                    data.data.forEach(item => {
                        setTimeout(() => renderCard(item), 100);
                        
                        // Custom Marker Icon
                        const iconHtml = `<div style="width:24px;height:24px;background:#161c28;border:2px solid #4cd7f6;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#4cd7f6;box-shadow:0 0 10px rgba(76,215,246,0.5);"><span class="material-symbols-outlined" style="font-size:12px;">location_on</span></div>`;
                        const mIcon = L.divIcon({className: 'custom-icon', html: iconHtml});

                        const marker = L.marker([item.lat, item.lon], {icon: mIcon}).addTo(map).bindPopup(`<div style="background:#161c28;color:white;padding:5px;border-radius:5px;border:1px solid #3d494c;"><b>${item.name}</b><br><span style="color:#bcc9cd;font-size:10px;">${item.type}</span></div>`, {className: 'dark-popup'});
                        markers.push(marker);
                    });
                    if(data.data.length > 0) {
                        const bounds = L.latLngBounds(data.data.map(p => [p.lat, p.lon]));
                        map.fitBounds(bounds.pad(0.2));
                    }
                }
            } catch(e) { addMsg('bot', "❌ Matrix Error. Connection lost."); }
        }

        function renderCard(item) {
            const div = document.createElement('div');
            div.className = 'service-card';
            
            let statusHtml = "";
            let btnText = "Engage Link";
            let btnAction = `window.open('${item.link}', '_blank')`;
            let visitBtnStyle = "";

            const type = item.type.toLowerCase();
            if (type.includes('toilet') || type.includes('restroom')) {
                visitBtnStyle = "display:none;";
            }

            if(item.beds) statusHtml = `<div class="live-status"><div class="dot dot-green"></div> <b>Capacity: ${item.beds}</b></div>`;
            else if(item.status) statusHtml = `<div class="live-status"><div class="dot dot-orange"></div> <b>${item.status}</b></div>`;
            else statusHtml = `<div class="live-status"><div class="dot dot-green"></div> <b>Online</b></div>`;

            div.innerHTML = `
                <div class="card-top">
                    <div class="card-name">${item.name}</div>
                    <span class="card-badge">${item.type}</span>
                </div>
                <div style="font-size:0.75rem; color:#869397; margin-bottom:5px; display:flex; align-items:center; gap:4px;">
                    <span class="material-symbols-outlined text-warning" style="font-size:14px; font-variation-settings: 'FILL' 1;">star</span> ${item.rating} • ${item.distance} km
                </div>
                ${statusHtml}
                <div class="flex gap-2 mt-3">
                    <button class="btn-act btn-nav" onclick="window.open('https://www.google.com/maps/dir/?api=1&destination=${item.lat},${item.lon}')">
                        <span class="material-symbols-outlined text-sm">navigation</span> Nav
                    </button>
                    <button class="btn-act btn-visit" style="${visitBtnStyle}" onclick="${btnAction}">
                        <span class="material-symbols-outlined text-sm">open_in_new</span> ${btnText}
                    </button>
                </div>
            `;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function triggerSOS() { window.open('https://wa.me/?text=🚨 EMERGENCY SOS! Location: 17.58, 78.43', '_blank'); }

        const modal = document.getElementById('reportModal');
        function openReportModal() { modal.style.display = 'flex'; }
        function closeReportModal() { modal.style.display = 'none'; }

        async function submitReport() {
            closeReportModal();
            Toastify({
                text: "✅ Bio-Report Transmitted!",
                duration: 3000, gravity: "top", position: "center", 
                style: { background: "#4edea3", color: "#002113", borderRadius: "10px", fontWeight: "bold" }
            }).showToast();

            const type = document.getElementById('issueType').value;
            const desc = document.getElementById('issueDesc').value;
            
            await fetch('/report-issue', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ userEmail: user.email, issueType: type, description: desc, location: userLocation || {lat: 17.58, lon: 78.43} })
            });
        }
    </script>
    <style>
        .leaflet-popup-content-wrapper { background: #161c28; color: white; border: 1px solid #3d494c; }
        .leaflet-popup-tip { background: #161c28; border: 1px solid #3d494c; }
    </style>
</body>
</html>
