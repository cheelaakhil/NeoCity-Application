<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>NeoCity | Utility &amp; Resource Manager</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-container-low": "#161c28",
                    "on-background": "#dde2f3",
                    "secondary": "#d0bcff",
                    "surface": "#0e131f",
                    "outline": "#869397",
                    "tertiary": "#4edea3",
                    "primary": "#4cd7f6",
                    "error": "#ffb4ab",
                    "surface-container": "#1a202c"
            },
            "fontFamily": {
                    "headline-xl": ["Outfit"],
                    "body-md": ["Inter"],
                    "label-sm": ["Inter"],
                    "headline-md": ["Outfit"],
                    "headline-lg": ["Outfit"],
                    "body-lg": ["Inter"]
            }
          }
        }
      }
</script>
<style>
        body { background-color: #0e131f; color: #dde2f3; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.3s ease; }
        .glass-card:hover { transform: translateY(-4px) scale(1.01); border-color: rgba(76, 215, 246, 0.4); box-shadow: 0 0 25px rgba(76, 215, 246, 0.15); }
        .bg-orb { position: absolute; width: 400px; height: 400px; border-radius: 50%; filter: blur(100px); z-index: -1; opacity: 0.15; animation: drift 20s infinite alternate; }
        @keyframes drift { from { transform: translate(-10%, -10%); } to { transform: translate(20%, 20%); } }
</style>
</head>
<body class="font-body-md overflow-x-hidden min-h-screen flex flex-col">
<div class="fixed inset-0 pointer-events-none overflow-hidden">
    <div class="bg-orb bg-primary top-[-10%] left-[-10%]"></div>
    <div class="bg-orb bg-secondary bottom-[-10%] right-[-10%]" style="animation-delay: -5s;"></div>
</div>
<nav class="fixed top-0 w-full z-50 bg-surface/10 backdrop-blur-md border-b border-outline/30 shadow-[0_0_15px_rgba(76,215,246,0.3)] flex justify-between items-center px-6 h-20">
    <div class="flex items-center gap-4 cursor-pointer" onclick="window.location.href='home.html'">
        <span class="font-headline-lg text-primary font-black tracking-tighter">NeoCity</span>
    </div>
    <div class="hidden md:flex gap-8">
        <a class="text-outline font-medium hover:text-primary transition-colors" href="home.html">Dashboard</a>
        <a class="text-primary font-bold border-b-2 border-primary pb-1" href="#">Utility Manager</a>
    </div>
</nav>
<main class="flex-1 mt-24 p-6 max-w-screen-xl mx-auto w-full">
    <header class="flex justify-between items-center mb-10">
        <div>
            <h1 class="font-headline-xl text-4xl mb-2">Municipal Utility Dashboard</h1>
            <p class="text-outline text-body-lg">City grid stability is at <span class="text-tertiary font-bold">98.4%</span>.</p>
        </div>
    </header>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
        <div class="glass-card p-6 rounded-3xl flex flex-col relative overflow-hidden group">
            <div class="flex justify-between items-start mb-4">
                <span class="text-label-sm font-bold text-primary uppercase tracking-widest">Energy Grid</span>
            </div>
            <div class="flex items-end gap-2 mb-6">
                <span class="font-headline-xl text-5xl" id="gridLoad">--</span><span class="text-outline mb-2">kWh</span>
            </div>
            <div class="w-full h-24 mt-auto flex items-end justify-between gap-2">
                <div class="w-full bg-primary/20 rounded-t-md hover:bg-primary/40" style="height: 60%"></div>
                <div class="w-full bg-primary/20 rounded-t-md hover:bg-primary/40" style="height: 80%"></div>
                <div class="w-full bg-primary/20 rounded-t-md hover:bg-primary/40" style="height: 45%"></div>
                <div class="w-full bg-primary/40 rounded-t-md animate-pulse" style="height: 85%"></div>
            </div>
        </div>
        <div class="glass-card p-6 rounded-3xl flex flex-col relative overflow-hidden group">
            <div class="flex justify-between items-start mb-4">
                <span class="text-label-sm font-bold text-tertiary uppercase tracking-widest">H2O Reservoir</span>
            </div>
            <div class="flex items-end gap-2 mb-6">
                <span class="font-headline-xl text-5xl" id="reservoirLevel">--</span><span class="text-outline mb-2">m³</span>
            </div>
            <div class="w-full h-24 flex items-center justify-center mt-auto">
                <div class="w-full h-4 bg-surface-container rounded-full overflow-hidden">
                    <div id="reservoirBar" class="h-full bg-tertiary w-0 transition-all duration-1000 shadow-[0_0_15px_rgba(78,222,163,0.5)]"></div>
                </div>
            </div>
        </div>
    </div>
</main>
<script>
    async function fetchUtilityData() {
        try {
            const res = await fetch('/api/utility-status');
            const data = await res.json();
            
            document.getElementById('gridLoad').innerText = data.gridLoad;
            document.getElementById('reservoirLevel').innerText = data.reservoirLevel + 'k';
            
            const fillPercentage = (data.reservoirLevel / data.reservoirMax) * 100;
            document.getElementById('reservoirBar').style.width = fillPercentage + '%';
        } catch(e) {
            console.error("Failed to fetch utility data", e);
        }
    }
    
    document.addEventListener('DOMContentLoaded', () => {
        fetchUtilityData();
        setInterval(fetchUtilityData, 5000); // Poll every 5s
    });
</script>
</body></html>
