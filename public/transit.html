<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>NeoCity Live Transit Hub</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;900&amp;family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-container-low": "#161c28",
                    "on-background": "#dde2f3",
                    "secondary": "#d0bcff",
                    "on-primary": "#003640",
                    "secondary-container": "#571bc1",
                    "on-secondary": "#3c0091",
                    "surface": "#0e131f",
                    "tertiary-fixed-dim": "#4edea3",
                    "on-tertiary-fixed-variant": "#005236",
                    "on-primary-container": "#00424f",
                    "surface-container-highest": "#2f3542",
                    "surface-container-high": "#242a36",
                    "outline": "#869397",
                    "on-error-container": "#ffdad6",
                    "surface-tint": "#4cd7f6",
                    "on-tertiary-fixed": "#002113",
                    "tertiary-fixed": "#6ffbbe",
                    "inverse-surface": "#dde2f3",
                    "surface-dim": "#0e131f",
                    "surface-bright": "#343946",
                    "background": "#0e131f",
                    "secondary-fixed": "#e9ddff",
                    "primary-fixed-dim": "#4cd7f6",
                    "on-surface-variant": "#bcc9cd",
                    "on-surface": "#dde2f3",
                    "on-primary-fixed": "#001f26",
                    "primary": "#4cd7f6",
                    "on-secondary-fixed": "#23005c",
                    "on-error": "#690005",
                    "surface-container-lowest": "#080e1a",
                    "on-secondary-fixed-variant": "#5516be",
                    "inverse-on-surface": "#2b303d",
                    "tertiary-container": "#1bbd85",
                    "primary-fixed": "#acedff",
                    "error": "#ffb4ab",
                    "surface-variant": "#2f3542",
                    "tertiary": "#4edea3",
                    "error-container": "#93000a",
                    "on-primary-fixed-variant": "#004e5c",
                    "on-tertiary-container": "#00452e",
                    "on-secondary-container": "#c4abff",
                    "outline-variant": "#3d494c",
                    "on-tertiary": "#003824",
                    "secondary-fixed-dim": "#d0bcff",
                    "inverse-primary": "#00687a",
                    "primary-container": "#06b6d4",
                    "surface-container": "#1a202c"
            },
            "fontFamily": {
                    "headline-xl": ["Outfit"],
                    "body-md": ["Inter"],
                    "label-sm": ["Inter"],
                    "headline-md": ["Outfit"],
                    "headline-lg": ["Outfit"]
            }
          }
        }
      }
</script>
<style>
        body { background-color: #0e131f; color: #dde2f3; overflow: hidden; }
        .glass-panel { background: rgba(22, 28, 40, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(134, 147, 151, 0.2); }
        .neon-glow-cyan { box-shadow: 0 0 15px rgba(76, 215, 246, 0.3); }
        .neon-text-cyan { text-shadow: 0 0 8px rgba(76, 215, 246, 0.6); }
        .maglev-line { stroke-dasharray: 10; animation: dash 20s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -1000; } }
        .pulse-node { animation: pulse-ring 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse-ring { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.5); opacity: 0.3; } }
        .stagger-in { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
</style>
</head>
<body class="font-body-md text-body-md h-screen flex flex-col">
<header class="fixed top-0 w-full z-50 bg-surface/10 backdrop-blur-md border-b border-outline-variant/30 shadow-[0_0_15px_rgba(76,215,246,0.3)] flex justify-between items-center px-6 h-20">
    <div class="flex items-center gap-4 cursor-pointer" onclick="window.location.href='home.html'">
        <span class="font-headline-lg text-headline-lg font-black tracking-tighter text-primary">NeoCity</span>
    </div>
    <nav class="hidden md:flex gap-8">
        <a class="text-on-surface-variant font-medium hover:text-primary transition-colors" href="home.html">Dashboard</a>
        <a class="text-on-surface-variant font-medium hover:text-primary transition-colors" href="chat.html">Command Center</a>
        <a class="text-primary font-bold border-b-2 border-primary pb-1" href="#">Transit</a>
    </nav>
</header>
<main class="flex-1 mt-20 relative overflow-hidden">
<div class="absolute inset-0 z-0">
    <div class="w-full h-full opacity-40 mix-blend-screen" style="background-image: url('https://images.unsplash.com/photo-1542382103-605bb16e8648?q=80&w=1920&auto=format&fit=crop'); background-size: cover; background-position: center;"></div>
    <svg class="absolute inset-0 w-full h-full pointer-events-none" viewbox="0 0 1000 1000">
        <path class="maglev-line opacity-60" d="M100 200 L400 350 L800 350 L900 600" fill="none" stroke="#4cd7f6" stroke-width="2"></path>
        <path class="maglev-line opacity-60" d="M200 800 L450 500 L800 200" fill="none" stroke="#d0bcff" stroke-width="2"></path>
        <circle class="pulse-node" cx="400" cy="350" fill="#4cd7f6" r="4"></circle>
        <circle class="pulse-node" cx="800" cy="350" fill="#4cd7f6" r="4"></circle>
        <circle class="pulse-node" cx="450" cy="500" fill="#d0bcff" r="4"></circle>
    </svg>
</div>
<div class="relative z-10 p-6 h-full grid grid-cols-12 gap-6 pointer-events-none">
    <div class="col-span-12 lg:col-span-4 flex flex-col gap-6 pointer-events-auto">
        <div class="glass-panel rounded-xl p-6 stagger-in" style="animation-delay: 0.1s;">
            <div class="flex justify-between items-center mb-6">
                <h2 class="font-headline-md text-headline-md text-on-surface">Transit Overview</h2>
                <span class="bg-tertiary-container/20 text-tertiary px-3 py-1 rounded-full text-label-sm border border-tertiary/30">SYSTEM NOMINAL</span>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="p-4 bg-surface-container-high/30 rounded-lg border border-outline-variant/20">
                    <div class="text-label-sm text-outline mb-1 uppercase tracking-wider">Active Fleets</div>
                    <div class="text-headline-lg font-black text-primary">128</div>
                </div>
                <div class="p-4 bg-surface-container-high/30 rounded-lg border border-outline-variant/20">
                    <div class="text-label-sm text-outline mb-1 uppercase tracking-wider">Avg Velocity</div>
                    <div class="text-headline-lg font-black text-secondary">420<span class="text-body-md font-normal text-outline ml-1">km/h</span></div>
                </div>
            </div>
        </div>
        <div class="glass-panel rounded-xl p-6 flex-1 stagger-in" style="animation-delay: 0.2s;">
            <div class="flex items-center gap-2 mb-6">
                <h2 class="font-headline-md text-headline-md text-on-surface">Station Arrival Feed</h2>
            </div>
            <div class="space-y-4">
                <div class="flex items-center justify-between p-4 bg-surface-container-high/20 rounded-lg border-l-4 border-primary">
                    <div><div class="font-bold text-on-surface">Central District</div><div class="text-label-sm text-outline">Line Blue • Fleet #402</div></div>
                    <div class="text-right"><div class="text-headline-md font-bold text-primary neon-text-cyan">02:45</div><div class="text-label-sm text-tertiary">ON TIME</div></div>
                </div>
                <div class="flex items-center justify-between p-4 bg-surface-container-high/20 rounded-lg border-l-4 border-secondary">
                    <div><div class="font-bold text-on-surface">Sector 4 Nexus</div><div class="text-label-sm text-outline">Line Purple • Fleet #119</div></div>
                    <div class="text-right"><div class="text-headline-md font-bold text-secondary">05:12</div><div class="text-label-sm text-outline">APPROACHING</div></div>
                </div>
            </div>
        </div>
    </div>
</div>
</main>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const counters = document.querySelectorAll('.text-headline-lg.font-black');
            counters.forEach(counter => {
                const target = parseInt(counter.innerText);
                if (!isNaN(target)) {
                    let count = 0;
                    const updateCount = () => {
                        const increment = target / 100;
                        if (count < target) {
                            count += increment;
                            counter.innerText = Math.ceil(count);
                            setTimeout(updateCount, 10);
                        } else {
                            counter.innerText = target;
                        }
                    };
                    updateCount();
                }
            });
            
            setInterval(() => {
                const nodes = document.querySelectorAll('.pulse-node');
                const randomNode = nodes[Math.floor(Math.random() * nodes.length)];
                randomNode.style.opacity = '1';
                setTimeout(() => { randomNode.style.opacity = '0.6'; }, 200);
            }, 3000);
        });
</script>
</body></html>
